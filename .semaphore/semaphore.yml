version: v1.0
name: Clone Speed Test (SSH + HTTPS x50)
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204

blocks:
  - name: Clone Test
    dependencies: []
    execution_time_limit:
      minutes: 40
    task:
      jobs:
        - name: clone-1
          commands:
            - grep -v github /etc/hosts > /tmp/hosts
            - sudo cp /tmp/hosts /etc/hosts
            - echo "140.82.116.3 github.com" | sudo tee -a /etc/hosts
            - echo -e "Host github.com\n  HostName 140.82.116.36" >> ~/.ssh/config
            - cat ~/.ssh/config
            - cat /etc/hosts
            - 'START=$(date +%s) && git clone git@github.com:semaphoreio/semaphore.git repo-ssh 2>&1 && END=$(date +%s) && echo "ssh-clone-1: $((END - START))s" && du -sh repo-ssh && rm -rf repo-ssh'
            - 'START=$(date +%s) && git clone https://github.com/semaphoreio/semaphore.git repo-https 2>&1 && END=$(date +%s) && echo "https-clone-1: $((END - START))s" && du -sh repo-https && rm -rf repo-https'
