version: v1.0
name: SSH Clone Repro
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204

blocks:
  - name: SSH Clone Stress
    dependencies: []
    task:
      jobs:
        - name: ssh clone 1
          commands:
            - echo "Start $(date -u)"
            - GIT_SSH_COMMAND="ssh -o ConnectTimeout=60 -v" git clone git@github.com:chromium/chromium.git /tmp/chromium-ssh 2>&1 || echo "SSH CLONE FAILED exit=$?"
            - echo "End $(date -u)"

        - name: ssh clone 2
          commands:
            - echo "Start $(date -u)"
