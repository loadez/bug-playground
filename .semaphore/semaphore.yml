version: v1.0
name: SSH Clone Repro - Retry + Timeout
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204

blocks:
  - name: SSH Clone With Retry
    dependencies: []
    task:
      env_vars:
        - name: GIT_SSH_COMMAND
          value: "ssh -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
      jobs:
        - name: ssh retry clone 1
          commands:
            - echo "Start $(date -u)"
            - retry --times 5 "git clone git@github.com:chromium/chromium.git /tmp/chromium-ssh"
            - echo "End $(date -u)"

        - name: ssh retry clone 2
          commands:
            - echo "Start $(date -u)"
            - retry --times 5 "git clone git@github.com:chromium/chromium.git /tmp/chromium-ssh"
            - echo "End $(date -u)"

        - name: ssh retry clone 3
          commands:
            - echo "Start $(date -u)"
            - retry --times 5 "git clone git@github.com:chromium/chromium.git /tmp/chromium-ssh"
            - echo "End $(date -u)"

        - name: ssh retry clone 4
          commands:
            - echo "Start $(date -u)"
            - retry --times 5 "git clone git@github.com:chromium/chromium.git /tmp/chromium-ssh"
            - echo "End $(date -u)"

        - name: ssh retry clone 5
          commands:
