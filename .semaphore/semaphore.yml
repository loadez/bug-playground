version: v1.0
name: Clone Speed Test (SSH + HTTPS x50)
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204

blocks:
  - name: Clone Test
    dependencies: []
    execution_time_limit:
      minutes: 40
    task:
      jobs:
        - name: clone
          parallelism: 50
          commands:
            - 'START=$(date +%s) && git clone git@github.com:semaphoreio/semaphore.git repo-ssh 2>&1 && END=$(date +%s) && echo "ssh-clone-$SEMAPHORE_JOB_INDEX: $((END - START))s" && du -sh repo-ssh && rm -rf repo-ssh'
            - 'START=$(date +%s) && git clone https://github.com/semaphoreio/semaphore.git repo-https 2>&1 && END=$(date +%s) && echo "https-clone-$SEMAPHORE_JOB_INDEX: $((END - START))s" && du -sh repo-https && rm -rf repo-https'
