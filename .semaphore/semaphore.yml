version: v1.0
name: Clone Speed Test (50 parallel)
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204

global_job_config:
  execution_time_limit:
    minutes: 40

blocks:
  - name: SSH Clone Test
    dependencies: []
    task:
      jobs:
        - name: clone-1
          commands:
            - grep -v github /etc/hosts > /tmp/hosts
            - sudo cp /tmp/hosts /etc/hosts
            - echo "140.82.116.3 github.com" | sudo tee -a /etc/hosts
            - echo -e "Host github.com\n  HostName 140.82.116.36\n  Port 22\n  User git" >> ~/.ssh/config
            - cat ~/.ssh/config
            - 'START=$(date +%s) && git clone git@github.com:semaphoreio/semaphore.git repo-1 2>&1 && END=$(date +%s) && echo "clone-1: $((END - START))s" && du -sh repo-1 && rm -rf repo-1' 
